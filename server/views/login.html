<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Red Funding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Montserrat', sans-serif;
      background: #1c2b16;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #253d1d;
      border: 1px solid rgba(255,238,208,0.1);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
    }
    .logo {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #ffeed0;
      margin-bottom: 8px;
    }
    .logo span { color: #E8000D; }
    .subtitle {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,238,208,0.35);
      margin-bottom: 36px;
    }
    label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,238,208,0.4);
      margin-bottom: 8px;
    }
    input {
      display: block;
      width: 100%;
      padding: 13px 16px;
      background: rgba(255,238,208,0.05);
      border: 1px solid rgba(255,238,208,0.12);
      border-radius: 30px;
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: #ffeed0;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 20px;
    }
    input:focus { border-color: rgba(232,0,13,0.6); }
    input::placeholder { color: rgba(255,238,208,0.2); }
    button {
      width: 100%;
      padding: 14px;
      background: #E8000D;
      color: #fff;
      border: none;
      border-radius: 30px;
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #A50009; }
    .error {
      margin-top: 16px;
      padding: 12px 16px;
      background: rgba(232,0,13,0.1);
      border: 1px solid rgba(232,0,13,0.3);
      border-radius: 8px;
      font-size: 13px;
      color: #ff6b6b;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">LADDER<span>I</span>CE</div>
    <div class="subtitle">Red Funding — Admin</div>

    <form method="POST" action="/admin/login">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="admin" autocomplete="username" required>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>

      <button type="submit">Sign In</button>
    </form>

    <!-- Show error if ?error=1 -->
    <script>
      if (new URLSearchParams(location.search).get('error')) {
        var el = document.createElement('div');
        el.className = 'error';
        el.textContent = 'Incorrect username or password.';
        document.querySelector('form').after(el);
      }
    </script>
  </div>
</body>
</html>
