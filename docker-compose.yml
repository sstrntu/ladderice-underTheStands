services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3002:3001"
    volumes:
      # Persist SQLite database outside the container
      - ./server/data:/app/data
      # Live-reload views and static assets during development
      - ./server/views:/app/views
      - ./server/public:/app/public
      - ./server/routes:/app/routes
    env_file:
      - ./server/.env
    restart: unless-stopped
